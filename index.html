<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="PromoRadar BR - agregador inteligente de promoções com monitoramento de preço, alertas e integração com múltiplas fontes."
    />
    <title>PromoRadar BR • Hub de Promoções Inteligente</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="container topbar-content">
        <div>
          <p class="eyebrow">Plataforma completa de ofertas</p>
          <h1>PromoRadar <span>BR</span></h1>
        </div>
        <div class="topbar-actions">
          <button id="refreshBtn" class="btn">Atualizar agora</button>
          <button id="themeBtn" class="btn btn-secondary">Tema</button>
        </div>
      </div>
    </header>

    <main class="container page-grid">
      <section class="panel controls-panel">
        <h2>Busca avançada</h2>
        <div class="form-grid">
          <label>
            Produto / termo
            <input id="queryInput" type="text" placeholder="Ex.: headset gamer" />
          </label>
          <label>
            Categoria
            <select id="categoryFilter">
              <option value="">Todas</option>
            </select>
          </label>
          <label>
            Fonte
            <select id="sourceFilter">
              <option value="">Todas</option>
              <option value="fakestore">FakeStore</option>
              <option value="dummyjson">DummyJSON</option>
              <option value="curated">Curadoria interna</option>
            </select>
          </label>
          <label>
            Preço máx. (R$)
            <input id="maxPriceInput" type="number" min="0" step="1" placeholder="2000" />
          </label>
          <label>
            Desconto mín. (%)
            <input id="minDiscountInput" type="number" min="0" max="95" value="10" />
          </label>
          <label>
            Ordenar
            <select id="sortBy">
              <option value="discount">Maior desconto</option>
              <option value="price-asc">Menor preço</option>
              <option value="price-desc">Maior preço</option>
              <option value="rating">Melhor avaliação</option>
            </select>
          </label>
        </div>
        <div class="panel-actions">
          <button id="applyBtn" class="btn">Aplicar filtros</button>
          <button id="clearBtn" class="btn btn-secondary">Limpar</button>
          <label class="auto-refresh">
            <input id="autoRefreshToggle" type="checkbox" />
            Auto refresh (5 min)
          </label>
        </div>
      </section>

      <section class="panel analytics-panel">
        <h2>Painel analítico</h2>
        <div class="stats" id="stats"></div>
        <canvas id="discountChart" width="640" height="180"></canvas>
      </section>

      <section class="panel alerts-panel">
        <h2>Alertas personalizados</h2>
        <form id="alertForm" class="alert-form">
          <input id="alertKeyword" type="text" placeholder="Palavra-chave (ex.: RTX)" required />
          <input id="alertTargetPrice" type="number" min="1" placeholder="Preço alvo" required />
          <button class="btn" type="submit">Salvar alerta</button>
        </form>
        <ul id="alertsList" class="alerts-list"></ul>
      </section>

      <section class="panel watchlist-panel">
        <h2>Favoritos / Watchlist</h2>
        <div id="watchlist" class="watchlist"></div>
      </section>

      <section class="panel products-panel">
        <div class="products-header">
          <h2>Ofertas encontradas</h2>
          <p id="lastUpdated" class="muted"></p>
        </div>
        <div id="productsGrid" class="products-grid"></div>
      </section>
    </main>

    <template id="productCardTemplate">
      <article class="product-card">
        <img class="product-image" alt="Imagem do produto" loading="lazy" />
        <div class="product-content">
          <p class="source-tag"></p>
          <h3 class="product-title"></h3>
          <p class="product-category muted"></p>
          <p class="product-description"></p>
          <div class="price-box">
            <p class="old-price"></p>
            <p class="current-price"></p>
            <p class="discount"></p>
          </div>
          <div class="rating-row"></div>
          <div class="product-actions">
            <a class="btn buy-link" target="_blank" rel="noopener noreferrer">Comprar</a>
            <button class="btn btn-secondary fav-btn" type="button">Favoritar</button>
          </div>
        </div>
      </article>
    </template>

    <script src="app.js" defer></script>
  </body>
</html>
